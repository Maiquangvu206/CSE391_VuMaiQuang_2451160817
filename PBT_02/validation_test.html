<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Validation Test</title>
    <style>
        body {
            font-family: system-ui, Segoe UI, Roboto, Arial;
            margin: 24px
        }

        form {
            max-width: 680px
        }

        label {
            display: block;
            margin: 12px 0 4px
        }

        input {
            padding: 8px;
            width: 100%;
            box-sizing: border-box
        }

        button {
            margin-top: 16px;
            padding: 10px 16px
        }
    </style>
</head>

<body>
    <h1>Validation Test — PBT_02</h1>
    <p>Nhấn <strong>Submit</strong> để xem validation built-in của trình duyệt. Không có <code>novalidate</code>.</p>

    <form action="#" method="PORT">
        <label for="case1">Trường hợp 1 — required, để trống</label>
        <input id="case1" name="case1" type="text" required value="">

        <label for="case2">Trường hợp 2 — type=email, value="abc"</label>
        <input id="case2" name="case2" type="email" value="abc">

        <label for="case3">Trường hợp 3 — type=number, min=1 max=10, value=15</label>
        <input id="case3" name="case3" type="number" min="1" max="10" value="15">

        <label for="case4">Trường hợp 4 — pattern 10 chữ số, value="abc123"</label>
        <input id="case4" name="case4" type="text" pattern="[0-9]{10}" value="abc123">
        
        <label for="case5">Trường hợp 5 — password minlength=8, value="123"</label>
        <input type="password" minlength="8" value="123"> <!-- User gõ "123" -->
        
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>

</html>
