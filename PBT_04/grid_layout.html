<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MQShop</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>
    <div class="site-grid">

        <header class="site-header">MQShop</header>
        <section class="hero">
            <div class="hero-banner">Hero banner (promotion / image)</div>
        </section>

        <aside class="sidebar">
            <h3>Filters</h3>
            <form>
                <label><input type="checkbox" /> Size S</label><br>
                <label><input type="checkbox" /> Size M</label><br>
                <label><input type="checkbox" /> Size L</label><br>
                <label><input type="checkbox" /> Color: Red</label><br>
                <label><input type="checkbox" /> On Sale</label>
            </form>
        </aside>

        <main class="main">
            <div class="cards-grid">
                <article class="card">
                    <div class="thumb">IMG</div>
                    <h4>Product A</h4>
                    <p class="price">$19.99</p>
                    <button class="buy">Buy</button>
                </article>

                <article class="card">
                    <div class="thumb">IMG</div>
                    <h4>Product B</h4>
                    <p class="price">$29.99</p>
                    <button class="buy">Buy</button>
                </article>

                <article class="card">
                    <div class="thumb">IMG</div>
                    <h4>Product C</h4>
                    <p class="price">$9.99</p>
                    <button class="buy">Buy</button>
                </article>

                <article class="card">
                    <div class="thumb">IMG</div>
                    <h4>Product D</h4>
                    <p class="price">$39.99</p>
                    <button class="buy">Buy</button>
                </article>

                <article class="card">
                    <div class="thumb">IMG</div>
                    <h4>Product E</h4>
                    <p class="price">$15.99</p>
                    <button class="buy">Buy</button>
                </article>

                <article class="card">
                    <div class="thumb">IMG</div>
                    <h4>Product F</h4>
                    <p class="price">$24.99</p>
                    <button class="buy">Buy</button>
                </article>

            </div>
        </main>

        <aside class="ads">Ads / Banner</aside>

        <footer class="site-footer">© 2026 MQShop. All rights reserved.</footer>

    </div>
</body>

</html>
