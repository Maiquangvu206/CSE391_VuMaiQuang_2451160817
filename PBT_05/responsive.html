<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MQShop</title>
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <button class="hamburger" id="hamburger" aria-label="Mở menu">☰</button>
            <h1 class="logo">MQShop</h1>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main container">
        <aside class="sidebar" id="sidebar">
            <h2>Filters</h2>
            <label>Category
                <select>
                    <option>All</option>
                    <option>Clothes</option>
                    <option>Electronics</option>
                </select>
            </label>
            <label>Price
                <select>
                    <option>All</option>
                    <option>Under $50</option>
                    <option>$50 - $200</option>
                </select>
            </label>
        </aside>

        <section class="products">
            <div class="product-grid">
                <article class="card"><img src="https://picsum.photos/400/300?random=1" alt="Product 1">
                    <h3>Product 1</h3>
                    <p class="price">$29</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=2" alt="Product 2">
                    <h3>Product 2</h3>
                    <p class="price">$49</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=3" alt="Product 3">
                    <h3>Product 3</h3>
                    <p class="price">$79</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=4" alt="Product 4">
                    <h3>Product 4</h3>
                    <p class="price">$19</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=5" alt="Product 5">
                    <h3>Product 5</h3>
                    <p class="price">$99</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=6" alt="Product 6">
                    <h3>Product 6</h3>
                    <p class="price">$59</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=7" alt="Product 7">
                    <h3>Product 7</h3>
                    <p class="price">$39</p>
                </article>
                <article class="card"><img src="https://picsum.photos/400/300?random=8" alt="Product 8">
                    <h3>Product 8</h3>
                    <p class="price">$129</p>
                </article>
            </div>
        </section>

        <aside class="ads">
            <div class="ad">AD</div>
        </aside>
    </main>

    <footer class="site-footer">
        <div class="container">© 2026 MQShop.</div>
    </footer>
</body>

</html>
